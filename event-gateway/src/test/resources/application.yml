spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:gatewaydb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

server:
  port: 8080

account-service:
  url: http://localhost:8081

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      accountService:
        timeoutDuration: 2s

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
