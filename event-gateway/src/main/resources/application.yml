spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:gatewaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8080

account-service:
  url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}

resilience4j:
  retry:
    instances:
      accountService:
        maxAttempts: 3
        waitDuration: 200ms
        exponentialBackoff:
          enabled: true
          multiplier: 2
          randomizationFactor: 0.5

outbox:
  retry:
    interval: 5000

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
